name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AIM.slnx

      - name: Build core and providers
        run: dotnet build AIM.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests\AIM.Tests\AIM.Tests.csproj --no-build --configuration Release --verbosity normal
