name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AIM.slnx

      - name: Build core and providers
        run: dotnet build AIM.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests\AIM.Tests\AIM.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Publish WPF desktop
        run: .\scripts\publish-desktop.ps1 -App Wpf -Configuration Release -OutputRoot artifacts/publish

      - name: Publish WinForms desktop
        run: .\scripts\publish-desktop.ps1 -App WinForms -Configuration Release -OutputRoot artifacts/publish

      - name: Upload WPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-M-WPF-win-x64
          path: artifacts/publish/AIM.Desktop.Wpf

      - name: Upload WinForms artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-M-WinForms-win-x64
          path: artifacts/publish/AIM.Desktop.WinForms
